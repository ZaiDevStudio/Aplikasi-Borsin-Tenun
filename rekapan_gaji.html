<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Rekapan Gaji - Borsin Tenun</title>
    <link rel="stylesheet" href="style.css?v=FINAL">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { background-color: #f1f2f6; padding-bottom: 90px; font-family: 'Poppins', sans-serif; margin: 0; }
        .navbar { background: #800000; color: white; padding: 20px; text-align: center; border-bottom-left-radius: 25px; border-bottom-right-radius: 25px; position: relative; }
        .container { padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; }
        .nama-karyawan { font-weight: 700; color: #333; text-transform: uppercase; font-size: 0.9rem; }
        .date-info { font-size: 0.7rem; color: #999; display: block; }
        .status-badge { font-size: 0.65rem; padding: 4px 8px; border-radius: 5px; font-weight: bold; text-transform: uppercase; }
        .status-pending { background: #fff3e0; color: #ef6c00; }
        .status-diterima { background: #d4edda; color: #155724; }
        .detail-box { font-size: 0.8rem; color: #555; margin: 10px 0; }
        .row-detail { display: flex; justify-content: space-between; padding: 3px 0; border-bottom: 1px inset #fafafa; }
        .text-red { color: #d63031; font-weight: 500; }
        .text-bold { font-weight: 600; color: #333; }
        .gaji-bersih-box { border-top: 2px solid #f1f2f6; margin-top: 10px; padding-top: 10px; display: flex; justify-content: space-between; align-items: center; }
        .gaji-nominal { color: #27ae60; font-size: 1.1rem; font-weight: 700; }
        .action-buttons { display: flex; gap: 5px; margin-top: 15px; }
        .btn-action { flex: 1; padding: 10px; border-radius: 8px; border: none; font-size: 0.7rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .btn-edit { background: #e3f2fd; color: #0d47a1; }
        .btn-delete { background: #ffebee; color: #c62828; }
        .btn-terima { background: #800000; color: white; }
        .valid-msg { width: 100%; text-align: center; color: #27ae60; font-weight: bold; font-size: 0.8rem; padding: 10px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; padding: 10px 0; border-top: 1px solid #eee; z-index: 100; }
        .nav-item { flex: 1; text-align: center; color: #ccc; text-decoration: none; font-size: 0.7rem; }
        .nav-item.active { color: #800000; font-weight: bold; }
        .nav-item i { font-size: 1.2rem; display: block; margin-bottom: 2px; }
    </style>
</head>
<body>

    <div class="navbar" onclick="aktifkanAdmin()">
        <h3 style="margin:0; font-size:1.2rem; letter-spacing: 1px;">REKAPAN GAJI</h3>
        <small style="font-size: 0.5rem; opacity: 0.5;">Klik judul jika tombol terima tidak muncul</small>
    </div>

    <div class="container" id="list-rekapan">
        <p style="text-align:center; color:#999; margin-top:50px;">Memuat rincian data...</p>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="hitung_gaji.html" class="nav-item"><i class="fas fa-calculator"></i><span>Hitung</span></a>
        <a href="rekapan_gaji.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Rekapan</span></a>
        <a href="laporan.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Laporan</span></a>
    </div>

    <script type="module">
        import { db } from "./config.js";
        import { collection, query, onSnapshot, orderBy, doc, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        // --- TOMBOL RAHASIA UNTUK ADMIN ---
        // Jika diklik judul "REKAPAN GAJI" di atas, status HP Bapak akan berubah jadi Admin
        window.aktifkanAdmin = () => {
            const pass = prompt("Masukkan Password Admin:");
            if(pass === "admin123") { // Bapak bisa ganti password ini
                localStorage.setItem("role", "admin");
                alert("Mode Admin Aktif! Halaman akan dimuat ulang.");
                location.reload();
            } else {
                alert("Password Salah!");
            }
        };

        const userRole = localStorage.getItem("role") || "anggota"; 

        window.terimaGaji = async (id) => {
            if(confirm("Konfirmasi: Gaji sudah dibayar dan diterima?")) {
                await updateDoc(doc(db, "gaji", id), { status: "Diterima" });
            }
        };

        window.hapusData = async (id) => {
            if(confirm("Hapus data ini?")) {
                await deleteDoc(doc(db, "gaji", id));
            }
        };

        window.editData = (id) => {
            window.location.href = `hitung_gaji.html?id=${id}`;
        };

        const q = query(collection(db, "gaji"), orderBy("timestamp", "desc"));
        
        onSnapshot(q, (snapshot) => {
            const container = document.getElementById("list-rekapan");
            let html = "";
            
            snapshot.forEach((docSnap) => {
                const d = docSnap.data();
                const id = docSnap.id;
                const isDiterima = d.status === "Diterima";
                const tgl = d.timestamp ? d.timestamp.toDate().toLocaleDateString('id-ID', { day:'2-digit', month:'short', year:'numeric', hour:'2-digit', minute:'2-digit' }) : '-';

                let rincianPotonganHtml = "";
                if(d.pakan > 0) rincianPotonganHtml += `<div class="row-detail"><span>Potongan Pakan</span><span class="text-red">- Rp ${d.pakan.toLocaleString()}</span></div>`;
                if(d.pot_air > 0) rincianPotonganHtml += `<div class="row-detail"><span>Pot. Air</span><span class="text-red">- Rp ${d.pot_air.toLocaleString()}</span></div>`;
                if(d.pot_wifi > 0) rincianPotonganHtml += `<div class="row-detail"><span>Pot. Wifi</span><span class="text-red">- Rp ${d.pot_wifi.toLocaleString()}</span></div>`;
                if(d.pot_stell > 0) rincianPotonganHtml += `<div class="row-detail"><span>Pot. Stell</span><span class="text-red">- Rp ${d.pot_stell.toLocaleString()}</span></div>`;
                if(d.daftar_potongan) {
                    d.daftar_potongan.forEach(p => {
                        rincianPotonganHtml += `<div class="row-detail"><span>${p.ket}</span><span class="text-red">- Rp ${p.val.toLocaleString()}</span></div>`;
                    });
                }

                let tombolHtml = "";
                if (!isDiterima) {
                    tombolHtml += `
                        <button class="btn-action btn-edit" onclick="editData('${id}')"><i class="fas fa-edit"></i> EDIT</button>
                        <button class="btn-action btn-delete" onclick="hapusData('${id}')"><i class="fas fa-trash"></i> HAPUS</button>
                    `;
                    // CEK ROLE DISINI
                    if (userRole === "admin") {
                        tombolHtml += `<button class="btn-action btn-terima" onclick="terimaGaji('${id}')"><i class="fas fa-check"></i> TERIMA</button>`;
                    }
                } else {
                    tombolHtml = `<div class="valid-msg"><i class="fas fa-check-double"></i> DATA TELAH DIVALIDASI</div>`;
                }

                html += `
                    <div class="card">
                        <div class="card-header">
                            <div><span class="nama-karyawan">${d.nama_karyawan}</span><span class="date-info">${tgl}</span></div>
                            <span class="status-badge ${isDiterima ? 'status-diterima' : 'status-pending'}">${d.status || 'Pending'}</span>
                        </div>
                        <div class="detail-box">
                            <div class="row-detail"><span class="text-bold">${d.nama_ulos} (${d.jumlah} Lbr)</span><span class="text-bold">Upah: Rp ${((d.upah_satuan || 0) * (d.jumlah || 0)).toLocaleString()}</span></div>
                            <div style="margin-top:5px; border-top: 1px solid #f9f9f9; padding-top:5px;">${rincianPotonganHtml || '<span>Tanpa Potongan</span>'}</div>
                        </div>
                        <div class="gaji-bersih-box"><span>TOTAL BERSIH:</span><span class="gaji-nominal">Rp ${(d.gajiBersih || 0).toLocaleString('id-ID')}</span></div>
                        <div class="action-buttons">${tombolHtml}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        });
    </script>
</body>
</html>

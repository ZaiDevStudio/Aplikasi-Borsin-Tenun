<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Rekapan Produksi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { background-color: #f8f9fa; padding-bottom: 90px; font-family: 'Poppins', sans-serif; margin: 0; }
        
        .navbar { 
            background: #800000; color: white; padding: 20px; text-align: center; 
            border-bottom-left-radius: 25px; border-bottom-right-radius: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .container { padding: 15px; }
        .card-rekapan { 
            background: white; border-radius: 20px; padding: 18px; margin-bottom: 15px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid #800000;
        }
        
        .header-card { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .nama-penenun { font-weight: 700; color: #2d3436; font-size: 1rem; }
        
        .status-badge { padding: 4px 10px; border-radius: 10px; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; }
        .status-pending { background: #fff3e0; color: #e65100; }
        .status-diterima { background: #e8f5e9; color: #2e7d32; }

        .harga-total { color: #800000; font-weight: 700; font-size: 1.2rem; display: block; margin: 5px 0; }

        .detail-box { 
            background: #fdfdfd; padding: 10px; border-radius: 12px; 
            margin: 10px 0; border: 1px dashed #ddd; font-size: 0.8rem; color: #636e72;
        }
        
        .btn-group { display: flex; gap: 8px; margin-top: 15px; justify-content: flex-end; }
        .btn-aksi { 
            padding: 10px 14px; border-radius: 10px; border: none; font-size: 0.75rem; 
            font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 5px;
        }
        .btn-edit { background: #0984e3; color: white; }
        .btn-hapus { background: #d63031; color: white; }
        .btn-terima { background: #27ae60; color: white; }
        
        .terkunci { 
            color: #0984e3; font-weight: 600; font-size: 0.8rem; 
            display: flex; align-items: center; justify-content: flex-end; gap: 6px; margin-top: 10px;
        }

        .bottom-nav { 
            position: fixed; bottom: 0; left: 0; right: 0; background: white; 
            display: flex; justify-content: space-around; padding: 10px 0; 
            border-top: 1px solid #eee; height: 70px; align-items: center; z-index: 1000; 
        }
        .nav-item { text-decoration: none; color: #b2bec3; text-align: center; font-size: 0.7rem; flex: 1; }
        .nav-item.active { color: #800000; font-weight: 700; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div class="navbar">
        <h3 style="margin:0; font-size:1.1rem; letter-spacing:1px;">REKAPAN PRODUKSI</h3>
    </div>

    <div class="container" id="list-rekapan">
        <p style="text-align:center; color:#999; margin-top:50px;">Memuat data rekapan...</p>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="hitung_gaji.html" class="nav-item"><i class="fas fa-calculator"></i><span>Hitung</span></a>
        <a href="rekapan_gaji.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Rekapan</span></a>
        <a href="laporan.html" class="nav-item"><i class="fas fa-file-alt"></i><span>Laporan</span></a>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
        import { getFirestore, collection, query, orderBy, onSnapshot, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        const firebaseConfig = { apiKey: "AIzaSyAXM4yJgh9F7ajGQApB-Ux1itQ_3pkik_o", authDomain: "borsin-tenun-app.firebaseapp.com", projectId: "borsin-tenun-app", storageBucket: "borsin-tenun-app.firebasestorage.app", messagingSenderId: "718889934564", appId: "1:718889934564:web:c28a073e261d6783d096f1" };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let userRole = ""; 

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                // Ambil Role User dari Firestore
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    userRole = userDoc.data().role.toLowerCase();
                }
                loadData();
            } else {
                window.location.href = "login.html";
            }
        });

        function loadData() {
            const q = query(collection(db, "gaji"), orderBy("timestamp", "desc"));
            onSnapshot(q, (snapshot) => {
                const container = document.getElementById("list-rekapan");
                let html = "";

                if (snapshot.empty) {
                    container.innerHTML = "<p style='text-align:center; color:#999;'>Tidak ada data rekapan.</p>";
                    return;
                }

                snapshot.forEach((d) => {
                    const data = d.data();
                    const id = d.id;
                    const status = data.status || "Pending";
                    
                    let tombolAksi = "";

                    if (status === "Pending") {
                        // Tombol Edit & Hapus muncul untuk semua
                        const btnDasar = `
                            <button onclick="window.editData('${id}')" class="btn-aksi btn-edit">Edit</button>
                            <button onclick="window.hapusData('${id}')" class="btn-aksi btn-hapus">Hapus</button>
                        `;

                        // Tombol TERIMA HANYA muncul jika Role adalah ADMIN
                        if (userRole === "admin") {
                            tombolAksi = `
                                <div class="btn-group">
                                    ${btnDasar}
                                    <button onclick="window.terimaData('${id}')" class="btn-aksi btn-terima">Terima</button>
                                </div>
                            `;
                        } else {
                            tombolAksi = `<div class="btn-group">${btnDasar}</div>`;
                        }
                    } else {
                        // Jika sudah Diterima
                        tombolAksi = `<div class="terkunci"><i class="fas fa-check-circle"></i> Terkunci & Valid</div>`;
                    }

                    html += `
                        <div class="card-rekapan">
                            <div class="header-card">
                                <span class="nama-penenun">${data.nama_karyawan}</span>
                                <span class="status-badge ${status === 'Pending' ? 'status-pending' : 'status-diterima'}">${status}</span>
                            </div>
                            <span class="harga-total">Rp ${Number(data.gajiBersih).toLocaleString('id-ID')}</span>
                            <div class="detail-box">
                                ${data.nama_ulos} | Jml: ${data.jumlah} Lbr
                            </div>
                            ${tombolAksi}
                        </div>
                    `;
                });
                container.innerHTML = html;
            });
        }

        window.terimaData = async (id) => {
            if(confirm("Validasi data ini? Data akan masuk ke laporan permanen.")) {
                await updateDoc(doc(db, "gaji", id), { status: "Diterima" });
            }
        };

        window.hapusData = async (id) => {
            if(confirm("Hapus rekapan ini?")) {
                await deleteDoc(doc(db, "gaji", id));
            }
        };

        window.editData = (id) => {
            window.location.href = `hitung_gaji.html?id=${id}`;
        };

    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hitung Gaji - Borsin Tenun</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');
        .navbar { background: #800000; color: white; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: space-between; }
        .nav-btn { color: white; text-decoration: none; font-size: 1.2rem; }
        body { padding-bottom: 80px; font-family: 'Poppins', sans-serif; background: #f1f2f6; margin: 0; }
        .container { padding: 15px; max-width: 600px; margin: auto; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .form-control { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 0.9rem; }
        
        /* Checkbox Styling */
        .check-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .check-item { 
            background: #f9f9f9; border: 1px solid #ddd; padding: 12px 5px; 
            border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .check-item input { display: none; }
        .check-item i { display: block; font-size: 1.3rem; margin-bottom: 5px; color: #bbb; }
        .check-item span { font-size: 0.7rem; font-weight: bold; color: #555; display: block; }
        .check-item small { font-size: 0.6rem; color: #888; }
        
        .check-item.active { background: #fff5f5; border-color: #800000; box-shadow: 0 4px 10px rgba(128,0,0,0.1); }
        .check-item.active i { color: #800000; }
        .check-item.active span { color: #800000; }

        .btn-tambah-prod { background: #27ae60; color: white; border: none; padding: 12px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 15px; }
        .btn-tambah-pot { background: #0d47a1; color: white; border: none; padding: 10px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        .btn-utama { background: #800000; color: white; border: none; width: 100%; padding: 16px; border-radius: 15px; font-weight: bold; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(128,0,0,0.3); }
        
        .prod-item { background: #fafafa; padding: 15px; border-radius: 15px; border: 1px solid #eee; margin-bottom: 15px; position: relative; }
        .input-group{position:relative;display:flex;align-items:center;margin-bottom:10px}
        .input-group span{position:absolute;left:12px;color:#888;font-weight:bold;font-size:0.8rem}
        .input-group input{padding-left:38px;width:100%}
        .auto-fill { background:#f1f1f1; color: #555; font-weight: bold; }
        .label-auto { font-size: 0.65rem; color: #800000; font-weight: bold; margin-left: 5px; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="rekapan_gaji.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
        <h3 id="title-page" style="margin:0; flex-grow:1;">Hitung Gaji</h3>
        <div style="width:30px"></div>
    </div>

    <div class="container">
        <form id="f">
            <div class="card">
                <h4>Data Karyawan</h4>
                <select id="kar" class="form-control" required><option value="">-- Pilih Karyawan --</option></select>
            </div>

            <div class="card">
                <h4>Produksi Ulos</h4>
                <div id="prod-list"></div>
                <button type="button" class="btn-tambah-prod" onclick="addProdRow()"><i class="fas fa-plus-circle"></i> TAMBAH JENIS ULOS</button>
            </div>

            <div class="card">
                <h4>Potongan Wajib (klik sampai berubah warna jadi merah untuk memilih)</h4>
                <div class="check-grid">
                    <label class="check-item" id="label_air">
                        <input type="checkbox" id="check_air" onchange="toggleCheck(this, 'label_air')">
                        <i class="fas fa-faucet"></i>
                        <span>AIR</span>
                        <small id="txt_air">Rp 100.000</small>
                    </label>
                    <label class="check-item" id="label_wifi">
                        <input type="checkbox" id="check_wifi" onchange="toggleCheck(this, 'label_wifi')">
                        <i class="fas fa-wifi"></i>
                        <span>WIFI</span>
                        <small id="txt_wifi">Rp 35.000</small>
                    </label>
                    <label class="check-item" id="label_stell">
                        <input type="checkbox" id="check_stell" onchange="toggleCheck(this, 'label_stell')">
                        <i class="fas fa-tools"></i>
                        <span>STELL</span>
                        <small id="txt_stell">Rp 20.000</small>
                    </label>
                </div>

                <hr style="border: 0.5px solid #eee; margin: 20px 0;">
                
                <h4>Potongan Lainnya</h4>
                <div id="pot-list"></div>
                <button type="button" class="btn-tambah-pot" onclick="addPotRow()"><i class="fas fa-plus"></i> POTONGAN LAIN</button>
            </div>

            <div class="card" style="background:#e3f2fd;text-align:center; border: 2px solid #0d47a1">
                <p style="font-size:0.8rem; margin-bottom:5px">Total Gaji Bersih:</p>
                <h2 id="tot" style="color:#0d47a1; font-size:1.8rem;" data-val="0">Rp 0</h2>
            </div>

            <button type="submit" id="sv" class="btn-utama">KIRIM KE ADMIN</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from "./config.js";
        import { collection, getDocs, addDoc, updateDoc, doc, getDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        // --- NOMINAL HARGA POTONGAN SESUAI PERMINTAAN ---
        const hargaPotongan = {
            air: 100000,
            wifi: 35000,
            stell: 20000
        };

        let ulosOptions = "", ulosMap = {};
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');
        const num = v => Number(v) || 0;
        const fmt = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        window.toggleCheck = function(el, labelId) {
            const label = document.getElementById(labelId);
            if(el.checked) label.classList.add('active');
            else label.classList.remove('active');
            calculateGaji();
        }

        window.addProdRow = function(data = null) {
            const container = document.getElementById('prod-list');
            const div = document.createElement('div');
            div.className = 'prod-item';
            div.innerHTML = `
                <button type="button" style="position:absolute;top:10px;right:10px;background:none;border:none;color:#d32f2f" onclick="this.parentElement.remove(); calculateGaji();"><i class="fas fa-times-circle"></i></button>
                <label style="font-size:0.75rem; font-weight:bold; color:#555">Pilih Jenis Ulos</label>
                <select class="form-control p-ulos" required onchange="updateRowData(this)">
                    <option value="">-- Pilih --</option>${ulosOptions}
                </select>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                    <div><span class="label-auto">Upah/Pcs</span><div class="input-group"><span>Rp</span><input type="number" readonly class="form-control auto-fill p-upah"></div></div>
                    <div><span class="label-auto">Pakan/Pcs</span><div class="input-group"><span>Rp</span><input type="number" readonly class="form-control auto-fill p-pakan-satuan"></div></div>
                </div>
                <label style="font-size:0.75rem; font-weight:bold; color:#555">Jumlah (Lembar)</label>
                <input type="number" class="form-control p-jml" required placeholder="Contoh: 5" oninput="calculateGaji()">
            `;
            container.appendChild(div);
            if(data) {
                div.querySelector('.p-ulos').value = data.nama_ulos;
                div.querySelector('.p-upah').value = data.upah_satuan;
                div.querySelector('.p-pakan-satuan').value = data.pakan_satuan;
                div.querySelector('.p-jml').value = data.jumlah;
            }
        }

        window.updateRowData = function(el) {
            const parent = el.parentElement;
            const val = ulosMap[el.value];
            if(val) {
                parent.querySelector('.p-upah').value = val.upah;
                parent.querySelector('.p-pakan-satuan').value = val.pakan;
            }
            calculateGaji();
        }

        window.addPotRow = function(ket = '', val = '') {
            const container = document.getElementById('pot-list');
            const div = document.createElement('div');
            div.style = "display:flex; gap:8px; margin-bottom:10px; align-items:center;";
            div.innerHTML = `
                <input type="text" placeholder="Keterangan" class="form-control p-ket" value="${ket}" style="flex:1.5; margin-bottom:0">
                <div class="input-group" style="flex:1; margin-bottom:0"><span>Rp</span><input type="number" class="form-control p-val" value="${val}" oninput="calculateGaji()"></div>
                <i class="fas fa-minus-circle" style="color:#d32f2f; cursor:pointer" onclick="this.parentElement.remove(); calculateGaji();"></i>
            `;
            container.appendChild(div);
        }

        onAuthStateChanged(auth, u => { if (!u) window.location.href = 'login.html'; else initPage(); });

        async function initPage() {
            // Update teks harga di UI sesuai data terbaru
            document.getElementById('txt_air').innerText = fmt(hargaPotongan.air);
            document.getElementById('txt_wifi').innerText = fmt(hargaPotongan.wifi);
            document.getElementById('txt_stell').innerText = fmt(hargaPotongan.stell);

            const [snapU, snapK] = await Promise.all([
                getDocs(query(collection(db, "ulos"), orderBy("nama"))),
                getDocs(query(collection(db, "karyawan"), orderBy("nama")))
            ]);
            snapU.forEach(d => {
                const dt = d.data();
                ulosOptions += `<option value="${dt.nama}">${dt.nama}</option>`;
                ulosMap[dt.nama] = { upah: dt.upah || 0, pakan: dt.potongan_pakan_default || 0 };
            });
            snapK.forEach(d => { document.getElementById('kar').innerHTML += `<option value="${d.data().nama}">${d.data().nama}</option>`; });

            if (editId) {
                document.getElementById('title-page').innerText = "Edit Gaji";
                const snap = await getDoc(doc(db, "gaji", editId));
                if (snap.exists()) {
                    const o = snap.data();
                    document.getElementById('kar').value = o.nama_karyawan;
                    if(o.pot_air > 0) { document.getElementById('check_air').checked = true; document.getElementById('label_air').classList.add('active'); }
                    if(o.pot_wifi > 0) { document.getElementById('check_wifi').checked = true; document.getElementById('label_wifi').classList.add('active'); }
                    if(o.pot_stell > 0) { document.getElementById('check_stell').checked = true; document.getElementById('label_stell').classList.add('active'); }
                    if(o.produksi_multi) o.produksi_multi.forEach(p => addProdRow(p));
                    if(o.daftar_potongan) o.daftar_potongan.forEach(p => addPotRow(p.ket, p.val));
                    calculateGaji();
                }
            } else { addProdRow(); }
        }

        window.calculateGaji = function() {
            let kotor = 0, pakan = 0;
            document.querySelectorAll('.prod-item').forEach(row => {
                const u = num(row.querySelector('.p-upah').value);
                const p = num(row.querySelector('.p-pakan-satuan').value);
                const j = num(row.querySelector('.p-jml').value);
                kotor += (u * j); pakan += (p * j);
            });

            const pAir = document.getElementById('check_air').checked ? hargaPotongan.air : 0;
            const pWifi = document.getElementById('check_wifi').checked ? hargaPotongan.wifi : 0;
            const pStell = document.getElementById('check_stell').checked ? hargaPotongan.stell : 0;

            let pLain = 0;
            document.querySelectorAll('.p-val').forEach(input => { pLain += num(input.value); });

            const hasil = kotor - pakan - (pAir + pWifi + pStell) - pLain;
            document.getElementById('tot').innerText = fmt(hasil);
            document.getElementById('tot').dataset.val = hasil;
        };

        document.getElementById('f').onsubmit = async e => {
            e.preventDefault();
            const btn = document.getElementById('sv');
            btn.innerText = "Menyimpan..."; btn.disabled = true;

            try {
                let prodMulti = [], teksUlos = [], totalJml = 0, totalPk = 0;
                document.querySelectorAll('.prod-item').forEach(row => {
                    const nU = row.querySelector('.p-ulos').value;
                    const j = num(row.querySelector('.p-jml').value);
                    const uS = num(row.querySelector('.p-upah').value);
                    const pS = num(row.querySelector('.p-pakan-satuan').value);
                    prodMulti.push({ nama_ulos: nU, upah_satuan: uS, pakan_satuan: pS, jumlah: j });
                    teksUlos.push(nU); totalJml += j; totalPk += (pS * j);
                });

                const dataGaji = {
                    nama_karyawan: document.getElementById('kar').value,
                    nama_ulos: teksUlos.join(", "),
                    jumlah: totalJml,
                    pakan: totalPk,
                    produksi_multi: prodMulti,
                    pot_air: document.getElementById('check_air').checked ? hargaPotongan.air : 0,
                    pot_wifi: document.getElementById('check_wifi').checked ? hargaPotongan.wifi : 0,
                    pot_stell: document.getElementById('check_stell').checked ? hargaPotongan.stell : 0,
                    daftar_potongan: Array.from(document.querySelectorAll('.p-ket')).map((it, i) => ({
                        ket: it.value,
                        val: num(document.querySelectorAll('.p-val')[i].value)
                    })).filter(p => p.val > 0),
                    gajiBersih: num(document.getElementById('tot').dataset.val),
                    timestamp: serverTimestamp()
                };

                if (editId) await updateDoc(doc(db, "gaji", editId), dataGaji);
                else { dataGaji.status = "Pending"; await addDoc(collection(db, "gaji"), dataGaji); }

                alert("Data Berhasil Disimpan!"); window.location.href = "rekapan_gaji.html";
            } catch (er) { alert(er.message); btn.innerText = "SIMPAN"; btn.disabled = false; }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hitung & Edit Gaji - Borsin Tenun</title>
    <link rel="stylesheet" href="style.css?v=FINAL">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar { background: #800000; color: white; padding: 15px; text-align: center; display: flex; align-items: center; justify-content: space-between; }
        .nav-btn { color: white; text-decoration: none; font-size: 1.2rem; }
        .input-group{position:relative;display:flex;align-items:center;margin-bottom:10px}
        .input-group span{position:absolute;left:15px;color:#555;font-weight:bold;z-index:10;font-size:0.8rem}
        .input-group input{padding-left:35px;width:100%}
        body { padding-bottom: 80px; font-family: 'Poppins', sans-serif; background: #f1f2f6; margin: 0; }
        .container { padding: 15px; }
        .card { background: white; padding: 15px; border-radius: 15px; margin-bottom: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .auto-fill { background:#eee; cursor: not-allowed; }
        .label-auto { font-size: 0.7rem; color: #d32f2f; font-weight: bold; margin-bottom: 2px; display: block; }
        .form-control { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        
        /* Tombol Tambah Jenis Ulos (Hijau) */
        .btn-tambah-prod { background: #27ae60; color: white; border: none; padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 5px; margin-bottom: 10px; }
        /* Tombol Tambah Potongan (Biru) */
        .btn-tambah-pot { background: #0d47a1; color: white; border: none; padding: 10px; border-radius: 12px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 10px; }
        
        .btn-del { background: #d32f2f; color: white; border: none; padding: 10px; border-radius: 8px; }
        .btn-utama { background: #800000; color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; }
        
        /* Frame per jenis ulos */
        .prod-item { background: #f9f9f9; padding: 15px; border-radius: 12px; border: 1px solid #eee; margin-bottom: 15px; position: relative; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="rekapan_gaji.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
        <h3 id="title-page" style="margin:0; flex-grow:1; text-align:center;">Hitung Gaji</h3>
        <div style="width:30px"></div>
    </div>

    <div class="container">
        <form id="f">
            <div class="card">
                <h4>Data Karyawan</h4>
                <label>Pilih Karyawan</label>
                <select id="kar" class="form-control" required><option value="">-- Pilih --</option></select>
            </div>

            <div class="card">
                <h4>Data Produksi Ulos</h4>
                <div id="prod-list">
                    </div>
                <button type="button" class="btn-tambah-prod" onclick="addProdRow()">
                    <i class="fas fa-plus-circle"></i> TAMBAH JENIS ULOS
                </button>
            </div>

            <div class="card">
                <h4>Potongan Wajib</h4>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                    <div class="input-group"><span>Rp</span><input type="number" id="p_air" placeholder="Air" class="form-control" oninput="calculateGaji()"></div>
                    <div class="input-group"><span>Rp</span><input type="number" id="p_wifi" placeholder="Wifi" class="form-control" oninput="calculateGaji()"></div>
                    <div class="input-group"><span>Rp</span><input type="number" id="p_stell" placeholder="Stell" class="form-control" oninput="calculateGaji()"></div>
                </div>

                <hr style="border: 0.5px solid #eee; margin: 15px 0;">
                
                <h4>Potongan Lainnya</h4>
                <div id="pot-list"></div>
                <button type="button" class="btn-tambah-pot" onclick="addPotRow('', '')">
                    <i class="fas fa-plus-circle"></i> TAMBAH POTONGAN
                </button>
            </div>

            <div class="card" style="background:#e3f2fd;text-align:center; border: 2px solid #0d47a1">
                <p style="font-size:0.8rem; margin-bottom:5px">Total Gaji Diterima:</p>
                <h2 id="tot" style="color:#0d47a1" data-val="0">Rp 0</h2>
            </div>

            <button type="submit" id="sv" class="btn-utama" style="margin-top:15px;">SIMPAN DATA GAJI</button>
        </form>
    </div>

    <script type="module">
        import { auth, db } from "./config.js";
        import { collection, getDocs, addDoc, updateDoc, doc, getDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        let ulosOptions = "", ulosMap = {};
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id');
        
        const num = v => Number(v) || 0;
        const fmt = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        onAuthStateChanged(auth, u => {
            if (!u) window.location.href = 'login.html';
            else initPage();
        });

        // TAMBAH BARIS PRODUKSI BARU
        window.addProdRow = function(data = null) {
            const container = document.getElementById('prod-list');
            const div = document.createElement('div');
            div.className = 'prod-item';
            div.innerHTML = `
                <button type="button" class="btn-del" style="position:absolute;top:10px;right:10px;padding:5px 10px" onclick="this.parentElement.remove(); calculateGaji();"><i class="fas fa-times"></i></button>
                <label>Jenis Ulos</label>
                <select class="form-control p-ulos" required onchange="updateRowData(this)">
                    <option value="">-- Pilih --</option>
                    ${ulosOptions}
                </select>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                    <div>
                        <span class="label-auto">Upah/Pcs</span>
                        <div class="input-group"><span>Rp</span><input type="number" readonly class="form-control auto-fill p-upah"></div>
                    </div>
                    <div>
                        <span class="label-auto">Pot. Pakan/Pcs</span>
                        <div class="input-group"><span>Rp</span><input type="number" readonly class="form-control auto-fill p-pakan-satuan"></div>
                    </div>
                </div>
                <label>Jumlah (Lembar)</label>
                <input type="number" class="form-control p-jml" required placeholder="0" oninput="calculateGaji()">
            `;
            container.appendChild(div);

            if(data) {
                div.querySelector('.p-ulos').value = data.nama_ulos;
                div.querySelector('.p-upah').value = data.upah_satuan;
                div.querySelector('.p-pakan-satuan').value = data.pakan_satuan;
                div.querySelector('.p-jml').value = data.jumlah;
            }
        }

        window.updateRowData = function(el) {
            const parent = el.parentElement;
            const val = ulosMap[el.value];
            if(val) {
                parent.querySelector('.p-upah').value = val.upah;
                parent.querySelector('.p-pakan-satuan').value = val.pakan;
            }
            calculateGaji();
        }

        window.addPotRow = function(ket = '', val = '') {
            const container = document.getElementById('pot-list');
            const div = document.createElement('div');
            div.className = 'pot-item';
            div.style = "display:flex; gap:5px; margin-bottom:8px;";
            div.innerHTML = `
                <input type="text" placeholder="Ket" class="form-control p-ket" value="${ket}" style="flex:2; margin-bottom:0">
                <div class="input-group" style="flex:2; margin-bottom:0">
                    <span>Rp</span>
                    <input type="number" placeholder="Rp" class="form-control p-val" value="${val}" oninput="calculateGaji()">
                </div>
                <button type="button" class="btn-del" onclick="this.parentElement.remove(); calculateGaji();"><i class="fas fa-trash"></i></button>
            `;
            container.appendChild(div);
        }

        async function initPage() {
            const [snapU, snapK] = await Promise.all([
                getDocs(query(collection(db, "ulos"), orderBy("nama"))),
                getDocs(query(collection(db, "karyawan"), orderBy("nama")))
            ]);
            
            snapU.forEach(d => {
                const dt = d.data();
                ulosOptions += `<option value="${dt.nama}">${dt.nama}</option>`;
                ulosMap[dt.nama] = { upah: dt.upah || 0, pakan: dt.potongan_pakan_default || 0 };
            });
            
            snapK.forEach(d => {
                document.getElementById('kar').innerHTML += `<option value="${d.data().nama}">${d.data().nama}</option>`;
            });

            if (editId) {
                document.getElementById('title-page').innerText = "Edit Gaji";
                document.getElementById('sv').innerText = "PERBARUI DATA";
                const snap = await getDoc(doc(db, "gaji", editId));
                if (snap.exists()) {
                    const o = snap.data();
                    document.getElementById('kar').value = o.nama_karyawan;
                    document.getElementById('p_air').value = o.pot_air;
                    document.getElementById('p_wifi').value = o.pot_wifi;
                    document.getElementById('p_stell').value = o.pot_stell;
                    
                    if(o.produksi_multi) {
                        o.produksi_multi.forEach(p => addProdRow(p));
                    } else {
                        // Support data lama
                        addProdRow({ nama_ulos: o.nama_ulos, upah_satuan: o.upah_satuan, pakan_satuan: o.pakan_satuan || 0, jumlah: o.jumlah });
                    }

                    if(o.daftar_potongan) o.daftar_potongan.forEach(p => addPotRow(p.ket, p.val));
                    calculateGaji();
                }
            } else {
                addProdRow(); // Mulai dengan satu baris kosong
            }
        }

        window.calculateGaji = function() {
            let totalKotor = 0, totalPakan = 0;
            document.querySelectorAll('.prod-item').forEach(row => {
                const u = num(row.querySelector('.p-upah').value);
                const p = num(row.querySelector('.p-pakan-satuan').value);
                const j = num(row.querySelector('.p-jml').value);
                totalKotor += (u * j);
                totalPakan += (p * j);
            });

            const pWajib = num(document.getElementById('p_air').value) + num(document.getElementById('p_wifi').value) + num(document.getElementById('p_stell').value);
            let pLain = 0;
            document.querySelectorAll('.p-val').forEach(input => { pLain += num(input.value); });

            const hasil = totalKotor - totalPakan - pWajib - pLain;
            document.getElementById('tot').innerText = fmt(hasil);
            document.getElementById('tot').dataset.val = hasil;
        };

        document.getElementById('f').onsubmit = async e => {
            e.preventDefault();
            const btn = document.getElementById('sv');
            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            try {
                let prodMulti = [], teksUlos = [], totalJml = 0, totalPk = 0;
                document.querySelectorAll('.prod-item').forEach(row => {
                    const nU = row.querySelector('.p-ulos').value;
                    const uS = num(row.querySelector('.p-upah').value);
                    const pS = num(row.querySelector('.p-pakan-satuan').value);
                    const j = num(row.querySelector('.p-jml').value);

                    prodMulti.push({ nama_ulos: nU, upah_satuan: uS, pakan_satuan: pS, jumlah: j });
                    teksUlos.push(nU);
                    totalJml += j;
                    totalPk += (pS * j);
                });

                let dPot = [];
                document.querySelectorAll('.pot-item').forEach(item => {
                    const k = item.querySelector('.p-ket').value;
                    const v = num(item.querySelector('.p-val').value);
                    if(v > 0) dPot.push({ ket: k, val: v });
                });

                const dataGaji = {
                    nama_karyawan: document.getElementById('kar').value,
                    nama_ulos: teksUlos.join(", "), 
                    jumlah: totalJml,
                    pakan: totalPk,
                    produksi_multi: prodMulti,
                    pot_air: num(document.getElementById('p_air').value),
                    pot_wifi: num(document.getElementById('p_wifi').value),
                    pot_stell: num(document.getElementById('p_stell').value),
                    daftar_potongan: dPot,
                    gajiBersih: num(document.getElementById('tot').dataset.val),
                    timestamp: serverTimestamp()
                };

                if (editId) {
                    await updateDoc(doc(db, "gaji", editId), dataGaji);
                } else {
                    dataGaji.status = "Pending";
                    await addDoc(collection(db, "gaji"), dataGaji);
                }

                alert("Data Berhasil Disimpan!");
                window.location.href = "rekapan_gaji.html";
            } catch (er) {
                alert("Error: " + er.message);
                btn.innerText = "SIMPAN";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>

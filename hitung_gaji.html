<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Hitung & Edit Gaji</title>
    <link rel="stylesheet" href="style.css?v=FINAL">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .input-group{position:relative;display:flex;align-items:center;margin-bottom:10px}
        .input-group span{position:absolute;left:15px;color:#555;font-weight:bold;z-index:10;font-size:0.8rem}
        .input-group input{padding-left:35px;width:100%}
        body { padding-bottom: 80px; }
        .auto-fill { background:#eee; cursor: not-allowed; }
        .label-auto { font-size: 0.75rem; color: #d32f2f; font-weight: bold; margin-bottom: 2px; display: block; }
    </style>
</head>
<body>
    <div class="navbar">
        <a href="rekapan_gaji.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
        <h3 id="title-page">Hitung Gaji</h3>
    </div>

    <div class="container">
        <form id="f">
            <div class="card">
                <h4>Data Produksi</h4>
                <label>Karyawan</label>
                <select id="kar" class="form-control" required><option value="">-- Pilih --</option></select>
                
                <label>Pilih Ulos</label>
                <select id="ulos" class="form-control" required><option value="">-- Pilih --</option></select>
                
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px; margin-top:10px">
                    <div>
                        <span class="label-auto">Upah/Pcs</span>
                        <div class="input-group"><span>Rp</span><input type="number" id="upah" readonly class="form-control auto-fill"></div>
                    </div>
                    <div>
                        <span class="label-auto">Pot. Pakan/Pcs</span>
                        <div class="input-group"><span>Rp</span><input type="number" id="pakan" readonly class="form-control auto-fill"></div>
                    </div>
                </div>
                
                <label>Jumlah (Lembar)</label>
                <input type="number" id="jml" class="form-control" required placeholder="0" oninput="calculateGaji()">
            </div>

            <div class="card">
                <h4>Potongan Tambahan (Rp)</h4>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                    <div class="input-group"><span>Rp</span><input type="number" id="p1" placeholder="Air" class="form-control" oninput="calculateGaji()"></div>
                    <div class="input-group"><span>Rp</span><input type="number" id="p2" placeholder="Wifi" class="form-control" oninput="calculateGaji()"></div>
                    <div class="input-group"><span>Rp</span><input type="number" id="p3" placeholder="Stell" class="form-control" oninput="calculateGaji()"></div>
                    <div class="input-group"><span>Rp</span><input type="number" id="p4" placeholder="Lain" class="form-control" oninput="calculateGaji()"></div>
                </div>
            </div>

            <div class="card" style="background:#e3f2fd;text-align:center; border: 2px solid #0d47a1">
                <p style="font-size:0.8rem; margin-bottom:5px">Total Gaji Diterima:</p>
                <h2 id="tot" style="color:#0d47a1" data-val="0">Rp 0</h2>
            </div>

            <button id="sv" class="btn" style="margin-top:15px; margin-bottom: 20px;">SIMPAN DATA GAJI</button>
        </form>
    </div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="pesanan.html" class="nav-item"><i class="fas fa-clipboard-list"></i><span>Pesanan</span></a>
        <a href="data_karyawan.html" class="nav-item"><i class="fas fa-users"></i><span>Karyawan</span></a>
        <a href="slip_gaji.html" class="nav-item active"><i class="fas fa-wallet"></i><span>Keuangan</span></a>
    </div>

    <script type="module">
        import { auth, db } from "./config.js";
        import { collection, getDocs, addDoc, updateDoc, doc, getDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

        let ulosMap = {}, km = {};
        const urlParams = new URLSearchParams(window.location.search);
        const editId = urlParams.get('id'); 
        
        const num = v => Number(v) || 0;
        const fmt = n => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(n);

        onAuthStateChanged(auth, u => {
            if (!u) window.location.href = 'login.html';
            else initPage();
        });

        async function initPage() {
            const qU = query(collection(db, "ulos"), orderBy("nama"));
            const qK = query(collection(db, "karyawan"), orderBy("nama"));
            const [snapU, snapK] = await Promise.all([getDocs(qU), getDocs(qK)]);
            
            const su = document.getElementById('ulos'), sk = document.getElementById('kar');
            
            snapU.forEach(d => {
                const dt = d.data();
                su.innerHTML += `<option value="${dt.nama}">${dt.nama}</option>`;
                // Simpan upah DAN potongan pakan default
                ulosMap[dt.nama] = {
                    upah: dt.upah || 0,
                    pakan: dt.potongan_pakan_default || 0
                };
            });
            
            snapK.forEach(d => {
                const dt = d.data();
                sk.innerHTML += `<option value="${dt.nama}">${dt.nama}</option>`;
                km[dt.nama] = dt;
            });

            if (editId) {
                document.getElementById('title-page').innerText = "Edit Gaji";
                document.getElementById('sv').innerText = "PERBARUI DATA";
                const snap = await getDoc(doc(db, "gaji", editId));
                
                if (snap.exists()) {
                    const old = snap.data();
                    document.getElementById('kar').value = old.nama_karyawan;
                    document.getElementById('ulos').value = old.nama_ulos;
                    document.getElementById('upah').value = old.upah_satuan || 0;
                    document.getElementById('pakan').value = old.pakan_satuan || 0;
                    document.getElementById('jml').value = old.jumlah;
                    document.getElementById('p1').value = old.pot_air;
                    document.getElementById('p2').value = old.pot_wifi;
                    document.getElementById('p3').value = old.pot_stell;
                    document.getElementById('p4').value = old.pot_lain;
                    calculateGaji();
                }
            }
        }

        // Fungsi Hitung dibuat Global
        window.calculateGaji = function() {
            const upahPcs = num(document.getElementById('upah').value);
            const pakanPcs = num(document.getElementById('pakan').value);
            const jml = num(document.getElementById('jml').value);

            const upahTotal = upahPcs * jml;
            const pakanTotal = pakanPcs * jml;
            const potonganLain = num(document.getElementById('p1').value) + num(document.getElementById('p2').value) + num(document.getElementById('p3').value) + num(document.getElementById('p4').value);
            
            const hasilBersih = upahTotal - pakanTotal - potonganLain;
            
            document.getElementById('tot').innerText = fmt(hasilBersih);
            document.getElementById('tot').dataset.val = hasilBersih;
        };

        // Saat Ulos dipilih, ambil data upah & pakan dari Map
        document.getElementById('ulos').onchange = function() {
            const data = ulosMap[this.value];
            if(data) {
                document.getElementById('upah').value = data.upah;
                document.getElementById('pakan').value = data.pakan;
            }
            calculateGaji();
        };

        document.getElementById('f').onsubmit = async e => {
            e.preventDefault();
            const btn = document.getElementById('sv');
            btn.innerText = "Menyimpan...";
            btn.disabled = true;

            try {
                const kn = document.getElementById('kar').value;
                const jml = num(document.getElementById('jml').value);
                const pakanPcs = num(document.getElementById('pakan').value);
                
                const d = {
                    nama_karyawan: kn,
                    nama_ulos: document.getElementById('ulos').value,
                    upah_satuan: num(document.getElementById('upah').value),
                    pakan_satuan: pakanPcs,
                    jumlah: jml,
                    pakan: pakanPcs * jml, // Total potongan pakan
                    pot_air: num(document.getElementById('p1').value),
                    pot_wifi: num(document.getElementById('p2').value),
                    pot_stell: num(document.getElementById('p3').value),
                    pot_lain: num(document.getElementById('p4').value),
                    gajiBersih: num(document.getElementById('tot').dataset.val),
                    timestamp: new Date()
                };

                if (km[kn]) {
                    d.rekening = km[kn].rekening || "";
                    d.bank = km[kn].bank || "";
                    d.nama_rekening = km[kn].nama_rekening || "";
                    d.foto_qris = km[kn].foto_qris || "";
                }

                if (editId) {
                    await updateDoc(doc(db, "gaji", editId), d);
                } else {
                    await addDoc(collection(db, "gaji"), d);
                }

                alert("Gaji Berhasil Dicatat!");
                window.location.href = "rekapan_gaji.html";
            } catch (er) {
                alert("Gagal: " + er.message);
                btn.innerText = "SIMPAN DATA";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Input Ulos & Potongan</title>
    <link rel="stylesheet" href="style.css?v=FINAL">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .input-group { position:relative; display:flex; align-items:center; }
        .input-group span { position:absolute; left:15px; color:#555; font-weight:bold; }
        .input-group input { padding-left:40px; }
        
        /* Area khusus untuk aturan potongan gaji */
        .potongan-section { 
            background: #fff5f5; 
            border: 2px dashed #d32f2f; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            margin-top: 10px;
        }
        .form-control { margin-bottom: 15px; }
        label { font-weight: 600; font-size: 0.9rem; color: #444; display: block; margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="navbar">
    <a href="dashboard.html" class="nav-btn"><i class="fas fa-arrow-left"></i></a>
    <div class="brand-text"><h2>Input Ulos</h2><p>Stok & Aturan Gaji</p></div>
</div>

<div class="container" style="padding: 20px;">
    <div class="card">
        <form id="f">
            <label>Foto Ulos</label>
            <input type="file" id="foto" accept="image/*" required class="form-control">

            <label>Nama Ulos</label>
            <input type="text" id="nama" required class="form-control" placeholder="Contoh: Sadum Tarutung">

            <label>Jenis</label>
            <input type="text" id="jenis" required class="form-control" placeholder="Contoh: Sadum">

            <label>Motif</label>
            <input type="text" id="motif" required class="form-control">

            <label>Warna Dasar</label>
            <input type="color" id="warna" value="#800000" style="width:100%;height:45px;border-radius:10px;border:1px solid #ddd;margin-bottom:20px; cursor: pointer;">

            <label>Upah Penenun (Per Lembar)</label>
            <div class="input-group" style="margin-bottom: 15px;">
                <span>Rp</span>
                <input type="number" id="upah" required class="form-control" placeholder="0">
            </div>

            <div class="potongan-section">
                <label style="color: #d32f2f;"><i class="fas fa-cut"></i> Potongan Pakan Otomatis</label>
                <div class="input-group">
                    <span>Rp</span>
                    <input type="number" id="pot_pakan" required class="form-control" placeholder="Biaya benang per lembar">
                </div>
                <p style="font-size: 0.75rem; color: #666; margin: 5px 0 0 0;">
                    *Sistem akan memotong gaji penenun sebesar nilai ini secara otomatis.
                </p>
            </div>

            <label>Stok Awal</label>
            <input type="number" id="stok" required class="form-control" placeholder="0">

            <label>Harga Jual</label>
            <div class="input-group">
                <span>Rp</span>
                <input type="number" id="harga" required class="form-control" placeholder="0">
            </div>

            <button id="btn" type="submit" class="btn" style="margin-top:20px; width: 100%; padding: 15px; font-weight: bold;">
                <i class="fas fa-save"></i> SIMPAN DATA ULOS
            </button>
        </form>
    </div>
</div>

<div class="bottom-nav">
    <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
    <a href="pesanan.html" class="nav-item"><i class="fas fa-clipboard-list"></i>Pesanan</a>
    <a href="data_karyawan.html" class="nav-item"><i class="fas fa-users"></i>Karyawan</a>
    <a href="slip_gaji.html" class="nav-item"><i class="fas fa-wallet"></i>Keuangan</a>
</div>

<script type="module">
    import { db } from "./config.js";
    import { collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

    // Fungsi perkecil gambar agar tidak lemot
    const resize = (f) => new Promise(r => {
        const rd = new FileReader();
        rd.readAsDataURL(f);
        rd.onload = e => {
            const i = new Image();
            i.src = e.target.result;
            i.onload = () => {
                const c = document.createElement('canvas'), m = 600, s = m / i.width;
                c.width = m;
                c.height = i.height * s;
                c.getContext('2d').drawImage(i, 0, 0, c.width, c.height);
                r(c.toDataURL('image/jpeg', 0.7))
            }
        }
    });

    document.getElementById('f').onsubmit = async e => {
        e.preventDefault();
        const btn = document.getElementById('btn');
        const originalText = btn.innerHTML;
        
        btn.innerHTML = "<i class='fas fa-spinner fa-spin'></i> Menyimpan...";
        btn.disabled = true;

        try {
            const f = document.getElementById('foto');
            let fotoBase64 = "";
            if (f.files[0]) {
                fotoBase64 = await resize(f.files[0]);
            }

            // Data yang akan dikirim ke Firebase
            const dataUlos = {
                nama: document.getElementById('nama').value.trim(),
                jenis: document.getElementById('jenis').value.trim(),
                motif: document.getElementById('motif').value.trim(),
                warna: document.getElementById('warna').value,
                upah: Number(document.getElementById('upah').value) || 0,
                potongan_pakan_default: Number(document.getElementById('pot_pakan').value) || 0, // Inilah potongan otomatisnya
                stock: Number(document.getElementById('stok').value) || 0,
                harga: Number(document.getElementById('harga').value) || 0,
                foto: fotoBase64,
                timestamp: serverTimestamp() 
            };

            // Menggunakan addDoc untuk menghindari error "Document already exists"
            await addDoc(collection(db, "ulos"), dataUlos);
            
            alert("Berhasil! Data ulos dan aturan potongan pakan telah disimpan.");
            window.location.href = "ulos.html";

        } catch (er) {
            console.error("Error:", er);
            alert("Gagal menyimpan: " + er.message);
            btn.innerHTML = originalText;
            btn.disabled = false;
        }
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Laporan Gaji Diterima - Borsin Tenun</title>
    <link rel="stylesheet" href="style.css?v=FINAL">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');
        body { background-color: #f1f2f6; padding-bottom: 100px; font-family: 'Poppins', sans-serif; margin: 0; }
        
        /* Navbar - Judul Rata Tengah */
        .navbar { 
            background: #800000; 
            color: white; 
            padding: 20px; 
            text-align: center; /* Rata Tengah */
            border-bottom-left-radius: 25px; 
            border-bottom-right-radius: 25px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
        }

        /* Filter Card */
        .filter-card { background: white; margin: 15px; padding: 15px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .filter-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .filter-grid label { font-size: 0.7rem; font-weight: 700; color: #666; display: block; margin-bottom: 4px; }
        .filter-grid input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 10px; font-size: 0.8rem; box-sizing: border-box; outline: none; background: #f9f9f9; }
        .btn-filter { background: #800000; color: white; border: none; width: 100%; padding: 12px; border-radius: 12px; font-weight: 700; margin-top: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; }

        /* Summary Card */
        .summary-card { background: linear-gradient(135deg, #800000, #a52a2a); color: white; margin: 15px; padding: 20px; border-radius: 20px; text-align: center; box-shadow: 0 10px 20px rgba(128,0,0,0.2); }
        .summary-card h2 { margin: 5px 0; font-size: 1.8rem; }

        .container { padding: 10px; }
        
        /* Card Laporan */
        .report-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .report-header { border-bottom: 1px solid #eee; padding-bottom: 8px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; }
        .name { font-weight: 700; color: #333; text-transform: uppercase; font-size: 0.9rem; }
        .date-label { font-size: 0.7rem; color: #888; font-weight: normal; margin-top: 2px; display: block; }
        
        .detail-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 5px; color: #555; }
        .potongan-text { color: #d63031; font-weight: 600; }
        .total-row { border-top: 1px dashed #ccc; margin-top: 10px; padding-top: 10px; font-weight: 700; color: #27ae60; font-size: 1rem; display: flex; justify-content: space-between; }
        
        /* Rekap Box */
        .rekap-box { background: #fff; margin: 15px; padding: 18px; border-radius: 15px; border: 2px solid #800000; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .rekap-title { color: #800000; font-weight: 700; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 5px; font-size: 0.85rem; display: flex; align-items: center; gap: 8px; }
        .rekap-item { display: flex; justify-content: space-between; font-size: 0.8rem; padding: 5px 0; border-bottom: 1px solid #f2f2f2; }
        
        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #eee; height: 70px; align-items: center; z-index: 1000; }
        .nav-item { text-decoration: none; color: #b2bec3; text-align: center; font-size: 0.7rem; flex: 1; }
        .nav-item.active { color: #800000; font-weight: 700; }
        .nav-item i { font-size: 1.4rem; margin-bottom: 4px; display: block; }
    </style>
</head>
<body>

    <div class="navbar">
        <h3 style="margin:0; font-size:1.1rem; letter-spacing:1px; text-transform: uppercase;">Laporan Gaji Diterima</h3>
    </div>

    <div class="filter-card">
        <div class="filter-grid">
            <div>
                <label>Dari Tanggal:</label>
                <input type="date" id="tglMulai">
            </div>
            <div>
                <label>Sampai Tanggal:</label>
                <input type="date" id="tglSampai">
            </div>
        </div>
        <button class="btn-filter" id="btnCari"><i class="fas fa-filter"></i> FILTER DATA</button>
    </div>

    <div class="summary-card">
        <p style="margin:0; font-size:0.85rem; opacity:0.9;">Total Gaji Bersih Dibayarkan</p>
        <h2 id="grand-total">Rp 0</h2>
    </div>

    <div class="container" id="laporan-list">
        <p style="text-align:center; color:#999; margin-top:50px;">Memuat data laporan...</p>
    </div>

    <div id="ringkasan-container"></div>

    <div class="bottom-nav">
        <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="hitung_gaji.html" class="nav-item"><i class="fas fa-calculator"></i><span>Hitung</span></a>
        <a href="rekapan_gaji.html" class="nav-item"><i class="fas fa-wallet"></i><span>Rekapan</span></a>
        <a href="laporan.html" class="nav-item active"><i class="fas fa-file-alt"></i><span>Laporan</span></a>
    </div>

    <script type="module">
        import { db } from "./config.js";
        import { collection, query, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

        async function loadLaporan() {
            const list = document.getElementById("laporan-list");
            const ringkasanDiv = document.getElementById("ringkasan-container");
            const grandTotalElt = document.getElementById("grand-total");
            
            const tglMulaiVal = document.getElementById("tglMulai").value;
            const tglSampaiVal = document.getElementById("tglSampai").value;

            list.innerHTML = "<p style='text-align:center; color:#999; margin-top:50px;'>Mencari data...</p>";

            try {
                const q = query(collection(db, "gaji"), orderBy("timestamp", "desc"));
                const snapshot = await getDocs(q);
                
                let totalGaji = 0;
                let daftarPenenun = new Set();
                let rekapUlos = {};
                let rekapPotongan = { "Pakan": 0, "Air": 0, "Wifi": 0, "Stell": 0 };
                let html = "";

                if (snapshot.empty) {
                    list.innerHTML = "<p style='text-align:center; color:#999; margin-top:50px;'>Belum ada data laporan.</p>";
                    grandTotalElt.innerText = "Rp 0";
                    ringkasanDiv.innerHTML = "";
                    return;
                }

                snapshot.forEach(docSnap => {
                    const d = docSnap.data();
                    if (d.status !== "Diterima") return;

                    const tglData = d.timestamp ? d.timestamp.toDate() : new Date();
                    
                    if (tglMulaiVal) {
                        const dMulai = new Date(tglMulaiVal); dMulai.setHours(0,0,0,0);
                        if (tglData < dMulai) return;
                    }
                    if (tglSampaiVal) {
                        const dSampai = new Date(tglSampaiVal); dSampai.setHours(23,59,59,999);
                        if (tglData > dSampai) return;
                    }

                    const tglStr = tglData.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
                    const bersih = Number(d.gajiBersih) || 0;
                    const jml = Number(d.jumlah) || 0;
                    
                    totalGaji += bersih;
                    daftarPenenun.add(d.nama_karyawan);

                    rekapUlos[d.nama_ulos] = (rekapUlos[d.nama_ulos] || 0) + jml;
                    rekapPotongan["Pakan"] += Number(d.pakan) || 0;
                    rekapPotongan["Air"] += Number(d.pot_air) || 0;
                    rekapPotongan["Wifi"] += Number(d.pot_wifi) || 0;
                    rekapPotongan["Stell"] += Number(d.pot_stell) || 0;

                    let rincianPotHtml = "";
                    if (d.pakan > 0) rincianPotHtml += `<div class="detail-row"><span>Pot. Pakan:</span><span class="potongan-text">- Rp ${Number(d.pakan).toLocaleString('id-ID')}</span></div>`;
                    if (d.pot_air > 0) rincianPotHtml += `<div class="detail-row"><span>Pot. Air:</span><span class="potongan-text">- Rp ${Number(d.pot_air).toLocaleString('id-ID')}</span></div>`;
                    if (d.pot_wifi > 0) rincianPotHtml += `<div class="detail-row"><span>Pot. Wifi:</span><span class="potongan-text">- Rp ${Number(d.pot_wifi).toLocaleString('id-ID')}</span></div>`;
                    if (d.pot_stell > 0) rincianPotHtml += `<div class="detail-row"><span>Pot. Stell:</span><span class="potongan-text">- Rp ${Number(d.pot_stell).toLocaleString('id-ID')}</span></div>`;

                    if (d.daftar_potongan) {
                        d.daftar_potongan.forEach(p => {
                            rincianPotHtml += `<div class="detail-row"><span>${p.ket}:</span><span class="potongan-text">- Rp ${Number(p.val).toLocaleString('id-ID')}</span></div>`;
                            rekapPotongan[p.ket] = (rekapPotongan[p.ket] || 0) + Number(p.val);
                        });
                    }

                    html += `
                        <div class="report-item">
                            <div class="report-header">
                                <div><span class="name">${d.nama_karyawan}</span><span class="date-label">Divalidasi: ${tglStr}</span></div>
                            </div>
                            <div class="detail-row"><span>Produksi: <strong>${d.nama_ulos}</strong></span><span>${jml} Lbr</span></div>
                            <div style="border-top:1px solid #f9f9f9; margin:5px 0; padding-top:5px;"></div>
                            ${rincianPotHtml}
                            <div class="total-row"><span>Gaji Bersih:</span><span>Rp ${bersih.toLocaleString('id-ID')}</span></div>
                        </div>`;
                });

                list.innerHTML = html || "<p style='text-align:center; color:#999; margin-top:50px;'>Tidak ada data untuk periode ini.</p>";
                grandTotalElt.innerText = "Rp " + totalGaji.toLocaleString('id-ID');

                let ulosHtml = "";
                for (let jenis in rekapUlos) { ulosHtml += `<div class="rekap-item"><span>${jenis}</span><span>${rekapUlos[jenis]} Lbr</span></div>`; }
                let totalPotHtml = "";
                for (let ket in rekapPotongan) { 
                    if(rekapPotongan[ket] > 0) totalPotHtml += `<div class="rekap-item"><span>Total ${ket}</span><span style="color:#d32f2f">- Rp ${rekapPotongan[ket].toLocaleString('id-ID')}</span></div>`; 
                }

                ringkasanDiv.innerHTML = html ? `
                    <div class="rekap-box">
                        <div class="rekap-title"><i class="fas fa-users"></i> DATA PENENUN: ${daftarPenenun.size} ORANG</div>
                        <div style="margin-top:15px" class="rekap-title"><i class="fas fa-scroll"></i> RINGKASAN PRODUKSI</div>
                        ${ulosHtml}
                        <div style="margin-top:15px" class="rekap-title"><i class="fas fa-cut"></i> RINGKASAN POTONGAN</div>
                        ${totalPotHtml}
                    </div>` : "";

            } catch (error) {
                list.innerHTML = `<p style='color:red; text-align:center;'>Gagal memuat: ${error.message}</p>`;
            }
        }

        document.getElementById("btnCari").addEventListener("click", loadLaporan);
        loadLaporan();
    </script>
</body>
</html>
